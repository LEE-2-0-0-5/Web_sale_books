<svg width="250" height="120" viewBox="0 0 250 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients & Filters -->
    <linearGradient id="fogGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bdc3c7;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#ecf0f1;stop-opacity:0.6" />
    </linearGradient>
    <radialGradient id="moonGlow">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f1c40f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    /* Animations */
    .flicker { animation: flicker 3s infinite alternate; }
    .ghost-rise { animation: ghostRise 6s linear infinite; }
    .cat-tail { animation: tailWag 2s ease-in-out infinite alternate; transform-origin: top center; }
    .fog-move { animation: fogDrift 10s linear infinite alternate; }
    .eye-glow { animation: redGlow 1.5s infinite alternate; }

    @keyframes flicker {
      0%, 100% { opacity: 1; fill: #f1c40f; }
      50% { opacity: 0.5; fill: #e67e22; }
    }
    @keyframes ghostRise {
      0% { transform: translateY(0) scale(0.5); opacity: 0; }
      50% { opacity: 0.6; }
      100% { transform: translateY(-40px) scale(1); opacity: 0; }
    }
    @keyframes tailWag { from { transform: rotate(-10deg); } to { transform: rotate(10deg); } }
    @keyframes fogDrift { from { transform: translateX(-10px); } to { transform: translateX(10px); } }
    @keyframes redGlow { from { fill: #e74c3c; } to { fill: #ff0000; filter: drop-shadow(0 0 2px red); } }
  </style>

  <!-- BACKGROUND -->
  <!-- Moon (Behind House) -->
  <circle cx="80" cy="80" r="50" fill="url(#moonGlow)" opacity="0.3" />
  
  <!-- Hill Silhouette -->
  <path d="M0,120 Q50,90 100,100 T250,90 V120 H0 Z" fill="#150520" />

  <!-- MIDGROUND - HAUNTED HOUSE (More Detailed) -->
  <g transform="translate(40, 20)">
    <!-- Main House Body -->
    <path d="M20,100 L20,40 L60,10 L100,40 L100,100 Z" fill="#2c3e50" />
    <!-- Roof Texture -->
    <path d="M15,40 L60,5 L105,40" fill="#2c0e3a" stroke="#000" stroke-width="2"/>
    <path d="M15,40 H105" fill="none" stroke="#2c0e3a" stroke-width="2"/>
    
    <!-- Broken Windows -->
    <g class="flicker">
        <rect x="35" y="50" width="15" height="20" rx="2" />
        <path d="M42,50 V70 M35,60 H50" stroke="#2c3e50" stroke-width="1.5" />
    </g>
    <rect x="70" y="55" width="12" height="15" rx="2" fill="#1a1a1a" /> <!-- Dark Window -->
    
    <!-- Door (Crooked) -->
    <path d="M50,100 L50,75 Q60,70 70,75 L70,100" fill="#3e2723" />
    <circle cx="65" cy="88" r="1.5" fill="#f1c40f" />

    <!-- Vines on wall -->
    <path d="M20,100 Q25,80 35,90 T40,70" stroke="#27ae60" stroke-width="1.5" fill="none" opacity="0.7"/>
    
    <!-- Chimney & Smoke -->
    <rect x="75" y="20" width="12" height="20" fill="#34495e" />
    <g transform="translate(81, 20)">
         <circle class="ghost-rise" r="3" fill="#2ecc71" opacity="0.4" />
         <circle class="ghost-rise" r="5" cx="5" cy="-10" fill="#2ecc71" opacity="0.3" style="animation-delay: 1s;" />
    </g>
  </g>

  <!-- FOREGROUND OBJECTS -->

  <!-- Dead Tree (Left) - Detailed -->
  <g transform="translate(0, 50)">
    <path d="M10,70 Q15,40 5,20 M10,70 Q25,50 40,40 M10,70 Q5,60 -5,50" stroke="#000" stroke-width="2.5" fill="none" />
    <path d="M40,40 L45,35 M40,40 L42,45" stroke="#000" stroke-width="1.5" /> <!-- Twigs -->
  </g>

  <!-- Gravestones (Left & Center) -->
  <g transform="translate(150, 95)">
    <path d="M0,25 L0,5 Q5,0 10,5 L10,25 Z" fill="#7f8c8d" /> <!-- Cross -->
    <path d="M3,10 H7 M5,7 V15" stroke="#2c3e50" stroke-width="1" />
  </g>
  <g transform="translate(130, 100)">
    <path d="M0,20 Q5,0 15,0 Q25,0 30,20 Z" fill="#95a5a6" /> <!-- R.I.P Stone -->
    <text x="8" y="12" font-family="Arial" font-size="6" fill="#2c3e50" transform="rotate(-5 10 10)">RIP</text>
    <path d="M5,15 L10,18" stroke="#2c3e50" stroke-width="1" opacity="0.5"/> <!-- Crack -->
  </g>

  <!-- Fence (Right) -->
  <g transform="translate(180, 85)">
    <path d="M0,35 L0,10 L5,0 L10,10 L10,35" fill="#2c3e50" />
    <path d="M20,35 L20,15 L25,5 L30,15 L30,35" fill="#2c3e50" transform="rotate(5 25 35)" />
    <path d="M40,35 L40,12 L45,2 L50,12 L50,35" fill="#2c3e50" />
    <line x1="-5" y1="20" x2="55" y2="25" stroke="#2c3e50" stroke-width="2" />
  </g>

  <!-- Black Cat (Sitting on fence) -->
  <g transform="translate(222, 85) scale(0.6)">
    <ellipse cx="10" cy="15" rx="8" ry="12" fill="#000" /> <!-- Body -->
    <circle cx="10" cy="5" r="7" fill="#000" /> <!-- Head -->
    <path d="M4,2 L2,-4 L8,1 Z" fill="#000" /> <!-- Ear L -->
    <path d="M16,2 L18,-4 L12,1 Z" fill="#000" /> <!-- Ear R -->
    <path class="cat-tail" d="M15,20 Q25,10 25,25" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round" />
    <circle class="eye-glow" cx="7" cy="5" r="1.5" /> <!-- Eye L -->
    <circle class="eye-glow" cx="13" cy="5" r="1.5" /> <!-- Eye R -->
  </g>

  <!-- Pumpkins (More & Detailed) -->
  <g transform="translate(160, 105)">
    <circle cx="10" cy="10" r="10" fill="#d35400" />
    <path d="M5,8 L7,6 L9,8 M11,8 L13,6 L15,8 M6,13 Q10,16 14,13" fill="none" stroke="#2c0e3a" stroke-width="1.5" />
  </g>
  <g transform="translate(110, 110) scale(1.2)">
    <circle cx="10" cy="8" r="8" fill="#e67e22" />
    <rect x="9" y="-2" width="2" height="4" fill="#2e7d32" />
    <path class="flicker" d="M6,6 L8,4 L10,6 M11,6 L13,4 L15,6 M7,11 Q10,13 13,11" fill="none" stroke="#2c0e3a" stroke-width="1" />
  </g>

  <!-- Fog/Mist Overlay -->
  <rect x="0" y="100" width="250" height="20" fill="url(#fogGrad)" class="fog-move" opacity="0.5" />

</svg>

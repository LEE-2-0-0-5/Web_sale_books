<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="ink-wash-mai">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" />
    </filter>
  </defs>

  <g filter="url(#ink-wash-mai)">
    <!-- Branch (Dark Brown) coming from Top Right -->
    <path d="M200 10 Q150 20 120 50 T80 90" fill="none" stroke="#5D4037" stroke-width="4" stroke-linecap="round" />
    <path d="M120 50 Q100 40 90 20" fill="none" stroke="#5D4037" stroke-width="3" stroke-linecap="round" />
    <path d="M150 30 L160 50" fill="none" stroke="#5D4037" stroke-width="2" stroke-linecap="round" />

    <!-- Ochna Flowers (Yellow Mai) -->
    <g transform="translate(90, 20)">
      <circle cx="0" cy="0" r="9" fill="#FFEB3B" /> 
      <circle cx="0" cy="0" r="3" fill="#F57F17" />
    </g>
    <g transform="translate(80, 90)">
      <circle cx="0" cy="0" r="10" fill="#FFEB3B" />
      <circle cx="0" cy="0" r="3" fill="#F57F17" />
    </g>
    <g transform="translate(160, 50)">
       <circle cx="0" cy="0" r="8" fill="#FFEB3B" />
       <circle cx="0" cy="0" r="2" fill="#F57F17" />
    </g>
    <circle cx="110" cy="60" r="4" fill="#FDD835" />
    <circle cx="100" cy="40" r="3" fill="#FDD835" />

    <!-- RED CARD (Thiệp) Hanging -->
    <line x1="120" y1="50" x2="120" y2="70" stroke="#FFD700" stroke-width="2" />
    
    <!-- Card Body -->
    <rect x="95" y="70" width="50" height="90" rx="2" fill="#D32F2F" stroke="#B71C1C" stroke-width="1" />
    <rect x="98" y="73" width="44" height="84" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.5" /> <!-- Inner border -->
    
    <!-- TEXT: AN KHANG THỊNH VƯỢNG -->
    <text x="120" y="88" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFD700" text-anchor="middle">AN</text>
    <text x="120" y="103" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFD700" text-anchor="middle">KHANG</text>
    <text x="120" y="118" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFD700" text-anchor="middle">THỊNH</text>
    <text x="120" y="133" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFD700" text-anchor="middle">VƯỢNG</text>
    
    <!-- Tassel -->
    <line x1="120" y1="160" x2="120" y2="170" stroke="#FFD700" stroke-width="2" />
    <path d="M115 170 L125 170 L122 185 L118 185 Z" fill="#D32F2F" />
  </g>
</svg>

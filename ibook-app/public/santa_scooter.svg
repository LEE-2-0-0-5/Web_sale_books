<svg width="200" height="150" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Hand-drawn style filter -->
  <defs>
    <filter id="hand-drawn" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" />
    </filter>
  </defs>

  <g filter="url(#hand-drawn)" transform="translate(10,0)">
    <!-- Scooter -->
    <!-- Back Wheel -->
    <circle cx="40" cy="120" r="18" fill="#333" stroke="#000" stroke-width="2"/>
    <circle cx="40" cy="120" r="8" fill="#ddd"/>

    <!-- Front Wheel -->
    <circle cx="140" cy="120" r="18" fill="#333" stroke="#000" stroke-width="2"/>
    <circle cx="140" cy="120" r="8" fill="#ddd"/>

    <!-- Scooter Body -->
    <path d="M40 120 L130 120 Q150 120 145 90 L135 60" fill="none" stroke="#b71c1c" stroke-width="8" stroke-linecap="round" />
    <path d="M40 120 L100 120 L110 90 L40 90 Z" fill="#f5f5f5" stroke="#000" stroke-width="2" />
    
    <!-- Handlebars -->
    <path d="M135 60 L120 60" stroke="#333" stroke-width="4" stroke-linecap="round"/>

    <!-- Santa -->
    <!-- Bag -->
    <path d="M20 70 Q10 40 40 40 Q60 40 50 80 Z" fill="#FFD700" stroke="#000" stroke-width="2"/>
    <path d="M30 50 L40 50" stroke="#000" stroke-width="2"/>

    <!-- Body -->
    <path d="M50 90 Q40 50 80 50 Q110 50 100 90 Z" fill="#D32F2F" stroke="#000" stroke-width="2"/>
    
    <!-- Belt -->
    <path d="M55 85 L95 85" stroke="#000" stroke-width="4"/>
    <rect x="70" y="83" width="6" height="4" fill="gold"/>

    <!-- Head -->
    <circle cx="85" cy="45" r="14" fill="#FFCCBC" stroke="#000" stroke-width="1"/>
    
    <!-- Beard -->
    <path d="M75 50 Q85 70 95 50 Q100 50 100 45 Q105 65 85 70 Q65 65 70 45" fill="#fff" stroke="#ddd" stroke-width="1"/>
    
    <!-- Hat -->
    <path d="M72 40 Q85 20 105 35 L85 45 Z" fill="#D32F2F" stroke="#000" stroke-width="2"/>
    <circle cx="105" cy="35" r="5" fill="#fff"/>

    <!-- Arms -->
    <path d="M85 60 Q100 60 125 60" stroke="#D32F2F" stroke-width="6" stroke-linecap="round"/>
    <circle cx="125" cy="60" r="5" fill="#FFCCBC"/>
  </g>
</svg>

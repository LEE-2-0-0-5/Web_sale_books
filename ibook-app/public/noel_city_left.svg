<svg width="350" height="100" viewBox="0 0 350 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Version: Jerry Moved Far Right -->
  <defs>
    <filter id="colorful-sketch">
      <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" />
    </filter>
  </defs>

  <style>
    @keyframes twinkle {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .lights circle {
      animation: twinkle 1s infinite ease-in-out alternate;
    }
    .lights circle:nth-child(1) { animation-delay: 0s; }
    .lights circle:nth-child(2) { animation-delay: 0.4s; }
    .lights circle:nth-child(3) { animation-delay: 0.8s; }
    .lights circle:nth-child(4) { animation-delay: 0.2s; }
    
    @keyframes jerry-move {
       0%, 100% { transform: translateY(0); }
       50% { transform: translateY(-2px); }
    }
    .jerry { animation: jerry-move 1s infinite ease-in-out; }
    
    @keyframes tom-arm {
       0%, 100% { transform: rotate(0); }
       50% { transform: rotate(-10deg); }
    }
    .tom-arm { transform-origin: 40px 10px; animation: tom-arm 2s infinite ease-in-out; }
  </style>

  <g filter="url(#colorful-sketch)">
    <!-- Snowy Ground -->
    <path d="M0 80 Q50 75 100 85 T200 80 T350 90 L350 100 L0 100 Z" fill="#E1F5FE" stroke="#B3E5FC" stroke-width="2"/>

    <!-- Christmas Tree (Left) -->
    <g transform="translate(10, 35)">
      <polygon points="20,0 5,30 35,30" fill="#2E7D32" stroke="#1B5E20" stroke-width="1"/>
      <polygon points="20,15 0,50 40,50" fill="#388E3C" stroke="#1B5E20" stroke-width="1"/>
      <rect x="17" y="50" width="6" height="10" fill="#795548"/>
      <g class="lights">
        <circle cx="20" cy="10" r="2.5" fill="#FFD700"/>
        <circle cx="10" cy="40" r="2.5" fill="#D32F2F"/>
        <circle cx="30" cy="45" r="2.5" fill="#1976D2"/>
        <circle cx="15" cy="25" r="2.5" fill="#FFFFFF"/>
        <circle cx="25" cy="35" r="2.5" fill="#FF9800"/>
      </g>
      <polygon points="20, -5 22,0 27,0 23,4 25,10 20,6 15,10 17,4 13,0 18,0" fill="#FFD700"/>
    </g>

    <!-- Houses -->
    <g transform="translate(60, 40)">
      <rect x="5" y="20" width="30" height="30" fill="#D32F2F" stroke="#B71C1C" stroke-width="1"/>
      <rect x="15" y="35" width="10" height="15" fill="#FFCA28"/> 
      <path d="M0 20 L20 -5 L40 20 Z" fill="#FFF" stroke="#CFD8DC" stroke-width="1"/>
      <rect x="28" y="0" width="6" height="12" fill="#795548"/>
      <path d="M30 0 Q35 -10 40 -15" fill="none" stroke="#FFF" stroke-width="2" opacity="0.6"/>
    </g>
    <g transform="translate(100, 25)">
      <rect x="5" y="30" width="25" height="35" fill="#1565C0" stroke="#0D47A1" stroke-width="1"/>
      <rect x="10" y="40" width="15" height="10" fill="#FFF9C4"/>
      <path d="M0 30 L18 5 L35 30 Z" fill="#FFF" stroke="#CFD8DC" stroke-width="1"/>
    </g>

    <!-- Tree Right -->
    <g transform="translate(140, 45)">
       <polygon points="15,0 5,25 25,25" fill="#43A047" stroke="#2E7D32" stroke-width="1"/>
       <polygon points="15,15 0,40 30,40" fill="#4CAF50" stroke="#2E7D32" stroke-width="1"/>
       <rect x="12" y="40" width="6" height="8" fill="#795548"/>
       <g class="lights">
         <circle cx="15" cy="10" r="2.5" fill="#D32F2F"/>
         <circle cx="10" cy="35" r="2.5" fill="#FFEB3B"/>
         <circle cx="20" cy="25" r="2.5" fill="#00BCD4"/>
       </g>
    </g>

    <!-- SCENE: Tom & Jerry -->
    <g transform="translate(190, 40)">
      
      <!-- Snowman Body -->
      <g transform="translate(60, 20)">
         <circle cx="0" cy="20" r="15" fill="#FFF" stroke="#B0BEC5" stroke-width="1"/>
         <circle cx="0" cy="0" r="10" fill="#FFF" stroke="#B0BEC5" stroke-width="1"/>
      </g>

      <!-- TOM -->
      <g transform="translate(20, 10)">
        <ellipse cx="10" cy="35" rx="12" ry="20" fill="#9E9E9E" stroke="#616161" stroke-width="1"/>
        <path d="M10 35 L20 35 L25 45" stroke="#9E9E9E" stroke-width="4" stroke-linecap="round"/>
        
        <path d="M2 25 Q10 30 18 25" fill="none" stroke="#D32F2F" stroke-width="4"/>
        <path d="M14 28 L16 40" stroke="#D32F2F" stroke-width="3"/>

        <circle cx="10" cy="15" r="10" fill="#9E9E9E" stroke="#616161" stroke-width="1"/>
        <polygon points="2,8 5,2 10,8" fill="#9E9E9E" />
        <polygon points="10,8 15,2 18,8" fill="#9E9E9E" />
        <circle cx="10" cy="18" r="3" fill="#FFF"/>
        <circle cx="10" cy="17" r="1" fill="black"/>
        
        <path d="M0 10 Q10 5 20 10 L20 5 Q10 0 0 5 Z" fill="#1976D2"/>
        <circle cx="10" cy="2" r="3" fill="#FFF"/>

        <!-- Tom's Arm Moving -->
        <g class="tom-arm">
           <path d="M15 25 Q30 20 40 10" fill="none" stroke="#9E9E9E" stroke-width="4" stroke-linecap="round"/>
           <!-- Snowman Head being held -->
           <circle cx="40" cy="10" r="8" fill="#FFF" stroke="#B0BEC5" stroke-width="1"/>
           <circle cx="38" cy="8" r="1" fill="black"/>
           <circle cx="42" cy="8" r="1" fill="black"/>
           <path d="M40 10 L45 10 L40 15 Z" fill="orange"/>
        </g>
      </g>

      <!-- JERRY (Moved SIGNIFICANTLY to the Right) -->
      <g transform="translate(130, 55)" class="jerry">
        <ellipse cx="0" cy="0" rx="6" ry="10" fill="#D7CCC8" stroke="#8D6E63" stroke-width="1"/>
        <path d="M-5 -5 Q0 0 5 -5" fill="none" stroke="#388E3C" stroke-width="3"/> 
        <polygon points="-5,-10 0,-18 5,-10" fill="#D32F2F"/> 

        <circle cx="0" cy="-10" r="6" fill="#D7CCC8"/>
        <circle cx="-5" cy="-15" r="3" fill="#D7CCC8"/> 
        <circle cx="5" cy="-15" r="3" fill="#D7CCC8"/> 
        
        <circle cx="-2" cy="-10" r="1" fill="black"/>
        <circle cx="2" cy="-10" r="1" fill="black"/>

        <path d="M3 -5 L10 -15" stroke="#795548" stroke-width="2"/>
        <path d="M10 -15 L12 -20 M10 -15 L14 -12" stroke="#795548" stroke-width="1"/>
      </g>
    </g>
  </g>
</svg>
